<div class="layout-topbar d-flex justify-content-between align-items-center px-4">
  <!-- Left Side -->
  <div class="d-flex align-items-center">
    <h3 class="m-0 text-primary d-md-none">Antigravity</h3>
  </div>

  <!-- Right Side: User Profile & Actions -->
  <div class="d-flex align-items-center gap-3">
    <!-- Notification Bell -->
    <div class="notification-icon">
      <i class="fa-solid fa-bell text-secondary"></i>
      <span class="notification-dot"></span>
    </div>

    <!-- Divider -->
    <div class="topbar-divider d-none d-md-block"></div>

    <!-- User Profile -->
    <div class="user-profile d-flex align-items-center gap-2">
      <div class="avatar">A</div>
      <div class="d-none d-md-flex flex-column">
        <span class="user-name">Admin User</span>
        <span class="user-role">Manager</span>
      </div>
      <i class="fa-solid fa-chevron-down text-secondary d-none d-md-block ms-1" style="font-size: 0.7rem;"></i>
    </div>

    <!-- Divider -->
    <div class="topbar-divider d-none d-md-block"></div>

    <!-- Logout -->
    <button class="logout-btn" (click)="logout()" title="Logout">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
    </button>
  </div>
</div>
